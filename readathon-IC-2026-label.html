<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
margin:0;
padding:0;
background:transparent;
font-family:Helvetica,Arial,sans-serif;
}

.container{
max-width:980px;
margin:auto;
padding:40px 20px;
box-sizing:border-box;
}

.card{
background:#034a2a;
border-radius:38px;
padding:40px 30px 80px 30px;
text-align:center;
box-shadow:0 12px 32px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:auto;
display:block;
border-radius:22px;
box-shadow:0 10px 24px rgba(0,0,0,0.18);
}

.button-area{
display:flex;
justify-content:center;
transform:translateY(-40px);
}

.btn{
background:#d4c4ac;
color:#4d4b36;
text-decoration:none;
font-weight:600;
font-size:clamp(16px,2.5vw,22px);
padding:clamp(10px,2vw,16px) clamp(24px,4vw,42px);
border-radius:999px;
text-align:center;
line-height:1.3;
max-width:90%;

box-shadow:
0 8px 18px rgba(0,0,0,0.25),
inset 0 2px 0 rgba(255,255,255,0.45);

transition:all .18s ease;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:
0 16px 28px rgba(0,0,0,0.35),
inset 0 2px 0 rgba(255,255,255,0.45);
}

.btn:active{
transform:translateY(2px);
box-shadow:
0 4px 8px rgba(0,0,0,0.35),
inset 0 2px 0 rgba(255,255,255,0.45);
}

@media (max-width:600px){

.card{
padding:28px 18px 70px 18px;
border-radius:26px;
}

.button-area{
transform:translateY(-30px);
}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<img src="https://raw.githubusercontent.com/profjulian/temporaryimages/main/lectura.png">

<div class="button-area">

<a class="btn"
href="https://view.genially.com/698cb691cb7ed95ff0fa06e3/presentation-saint-patricks-day"
target="_blank">

Haz clic en este botón para participar

</a>

</div>

</div>

</div>

</body>
</html>
