<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html,body{
margin:0;
padding:0;
background:transparent;
font-family:Helvetica, Arial, sans-serif;
}

.wrapper{
max-width:980px;
margin:auto;
padding:40px 20px;
border-radius:38px;
background:#034a2a;
box-shadow:0 12px 32px rgba(0,0,0,0.15);
text-align:center;
box-sizing:border-box;
}

.wrapper img{
width:100%;
height:auto;
border-radius:22px;
box-shadow:0 10px 24px rgba(0,0,0,0.18);
display:block;
}

.button-zone{
margin-top:-50px;
}

.button-zone iframe{
width:100%;
max-width:100%;
height:140px;
border:0;
display:block;
}

@media (max-width:700px){

.wrapper{
padding:20px 10px;
}

.button-zone{
margin-top:-30px;
}

.button-zone iframe{
height:110px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<img src="https://raw.githubusercontent.com/profjulian/temporaryimages/main/lectura.png">

<div class="button-zone">

<iframe
src="https://profjulian.github.io/temporaryimages/buttoneng.html"
scrolling="no">
</iframe>

</div>

</div>

</body>
</html>
