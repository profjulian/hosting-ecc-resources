<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>readathon-IC-2026-label</title>

<style>

html,body{
margin:0;
padding:0;
background:transparent;
}

.wrapper{
width:100%;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:980px;
padding:50px 40px;
border-radius:38px;
background:#034a2a;
box-shadow:0 12px 32px rgba(0,0,0,0.15);
text-align:center;
box-sizing:border-box;
}

.container img{
width:100%;
height:auto;
border-radius:22px;
box-shadow:0 10px 24px rgba(0,0,0,0.18);
display:block;
}

.button-zone{
margin-top:-60px;
width:100%;
}

.button-zone iframe{
width:100%;
height:140px;
border:0;
display:block;
}

</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<img src="https://raw.githubusercontent.com/profjulian/temporaryimages/main/lectura.png">

<div class="button-zone">
<iframe
src="https://profjulian.github.io/temporaryimages/buttoneng.html"
scrolling="no">
</iframe>
</div>

</div>
</div>

<script>
function resizeParentIframe(){
const height = document.documentElement.scrollHeight;
if(window.parent){
window.parent.postMessage({iframeHeight: height}, "*");
}
}
window.addEventListener("load", resizeParentIframe);
window.addEventListener("resize", resizeParentIframe);
</script>

</body>
</html>
