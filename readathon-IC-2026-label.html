<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body{
margin:0;
padding:0;
background:transparent;
font-family:Helvetica, Arial, sans-serif;
}

.wrapper{
max-width:980px;
margin:auto;
padding:50px 40px;
border-radius:38px;
background:#034a2a;
box-shadow:0 12px 32px rgba(0,0,0,0.15);
text-align:center;
box-sizing:border-box;
}

.wrapper img{
display:block;
margin:auto;
width:100%;
height:auto;
border-radius:22px;
box-shadow:0 10px 24px rgba(0,0,0,0.18);
}

.button-area{
margin-top:-60px;
display:flex;
justify-content:center;
padding:40px 20px;
box-sizing:border-box;
}

.btn{
background:#d4c4ac;
color:#4d4b36;
text-decoration:none;
font-size:22px;
padding:16px 42px;
border-radius:999px;
font-weight:600;
text-align:center;
line-height:1.3;
max-width:90%;

box-shadow:
0 8px 18px rgba(0,0,0,0.25),
inset 0 2px 0 rgba(255,255,255,0.45);

transition:all .18s ease;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:
0 16px 28px rgba(0,0,0,0.35),
inset 0 2px 0 rgba(255,255,255,0.45);
}

.btn:active{
transform:translateY(2px);
box-shadow:
0 4px 8px rgba(0,0,0,0.35),
inset 0 2px 0 rgba(255,255,255,0.45);
}

@media (max-width:700px){

.wrapper{
padding:40px 20px;
}

.button-area{
margin-top:-40px;
}

.btn{
font-size:20px;
padding:14px 30px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<img src="https://raw.githubusercontent.com/profjulian/temporaryimages/main/lectura.png">

<div class="button-area">

<a class="btn"
href="https://view.genially.com/698cb691cb7ed95ff0fa06e3/presentation-saint-patricks-day"
target="_blank">

Haz clic en este botón para participar

</a>

</div>

</div>

</body>
</html>
