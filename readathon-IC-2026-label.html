<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body{
margin:0;
padding:0;
background:transparent;
font-family:Helvetica, Arial, sans-serif;
}

*{
box-sizing:border-box;
}

.container{
width:100%;
max-width:980px;
margin:0 auto;
padding:24px 16px;
}

.card{
background:#034a2a;
border-radius:32px;
padding:24px 20px 28px 20px;
text-align:center;
box-shadow:0 12px 32px rgba(0,0,0,0.15);
}

.hero{
display:block;
width:100%;
height:auto;
border-radius:22px;
box-shadow:0 10px 24px rgba(0,0,0,0.18);
}

.button-area{
margin-top:20px;
display:flex;
justify-content:center;
}

.btn{
display:inline-block;
width:min(100%, 720px);
background:#d4c4ac;
color:#4d4b36;
text-decoration:none;
font-weight:600;
font-size:clamp(15px, 2.6vw, 22px);
line-height:1.25;
padding:clamp(12px, 2.2vw, 18px) clamp(18px, 4vw, 42px);
border-radius:999px;
text-align:center;
word-break:normal;
overflow-wrap:break-word;
box-shadow:
0 8px 18px rgba(0,0,0,0.25),
inset 0 2px 0 rgba(255,255,255,0.45);
transition:transform .18s ease, box-shadow .18s ease;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:
0 12px 24px rgba(0,0,0,0.30),
inset 0 2px 0 rgba(255,255,255,0.45);
}

.btn:active{
transform:translateY(1px);
box-shadow:
0 4px 8px rgba(0,0,0,0.30),
inset 0 2px 0 rgba(255,255,255,0.45);
}

@media (max-width:600px){
.container{
padding:14px 8px;
}

.card{
padding:14px 12px 18px 12px;
border-radius:22px;
}

.button-area{
margin-top:14px;
}
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <img
      class="hero"
      src="https://raw.githubusercontent.com/profjulian/temporaryimages/main/lectura.png"
      alt="Lectura">

    <div class="button-area">
      <a
        class="btn"
        href="https://view.genially.com/698cb691cb7ed95ff0fa06e3/presentation-saint-patricks-day"
        target="_blank"
        rel="noopener noreferrer">
        Haz clic en este botón para participar
      </a>
    </div>
  </div>
</div>

</body>
</html>
